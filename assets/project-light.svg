<svg xmlns="http://www.w3.org/2000/svg" width="960" height="300" viewBox="0 0 960 300" role="img" aria-labelledby="title desc">
  <title id="title">retrieval-fairness — exposure audits for vector search and RAG</title>
  <desc id="desc">A custom project card showing a conceptual corpus exposure map and CI gate.</desc>

  <defs>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#9b3da8"/>
      <stop offset="0.55" stop-color="#167b9c"/>
      <stop offset="1" stop-color="#4d7c25"/>
    </linearGradient>
    <pattern id="microgrid" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M20 0H0V20" fill="none" stroke="#d2c6d4" stroke-width="0.55" opacity="0.36"/>
    </pattern>
    <filter id="glow" x="-150%" y="-150%" width="400%" height="400%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="mapClip"><rect x="570" y="48" width="342" height="204" rx="14"/></clipPath>
  </defs>

  <style>
    .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace; }
    .sans { font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    .flow { stroke-dasharray: 3 7; animation: flow 9s linear infinite; }
    .ping { transform-box: fill-box; transform-origin: center; animation: ping 2.9s ease-in-out infinite; }
    .ping2 { transform-box: fill-box; transform-origin: center; animation: ping 2.9s 1.1s ease-in-out infinite; }
    @keyframes flow { to { stroke-dashoffset: -100; } }
    @keyframes ping { 0%, 100% { opacity: .25; transform: scale(.72); } 50% { opacity: 1; transform: scale(1.2); } }
    @media (prefers-reduced-motion: reduce) { .flow, .ping, .ping2 { animation: none; } }
  </style>

  <rect width="960" height="300" rx="24" fill="#f7f3f6"/>
  <rect x="0.75" y="0.75" width="958.5" height="298.5" rx="23.25" fill="none" stroke="#d6cad8" stroke-width="1.5"/>
  <path d="M24 1H255" stroke="url(#accent)" stroke-width="2"/>

  <text x="48" y="43" class="mono" fill="#746a78" font-size="10" letter-spacing="1.8">01 / ACTIVE INSTRUMENT</text>
  <text x="47" y="91" class="sans" fill="#18131a" font-size="36" font-weight="720" letter-spacing="-1.1">retrieval-fairness</text>
  <text x="49" y="122" class="mono" fill="#9b3da8" font-size="12" letter-spacing="0.45">EXPOSURE AUDITS FOR VECTOR SEARCH &amp; RAG</text>

  <text x="49" y="158" class="sans" fill="#625967" font-size="14">Find the chunks your retriever never surfaces,</text>
  <text x="49" y="180" class="sans" fill="#625967" font-size="14">measure hub capture, then gate regressions in CI.</text>

  <rect x="48" y="204" width="362" height="39" rx="9" fill="#eee8ef" stroke="#cdc1cf"/>
  <circle cx="68" cy="223.5" r="3" fill="#4d7c25"/>
  <text x="82" y="228" class="mono" fill="#312a33" font-size="12">pip install retrieval-fairness</text>
  <text x="389" y="228" text-anchor="end" class="mono" fill="#786e7b" font-size="10">↗</text>

  <g class="mono" font-size="9" letter-spacing="1">
    <text x="49" y="274" fill="#746a78">PYTHON</text>
    <circle cx="105" cy="271" r="1.5" fill="#b1a5b3"/>
    <text x="117" y="274" fill="#746a78">MIT</text>
    <circle cx="148" cy="271" r="1.5" fill="#b1a5b3"/>
    <text x="160" y="274" fill="#746a78">FAISS</text>
    <circle cx="205" cy="271" r="1.5" fill="#b1a5b3"/>
    <text x="217" y="274" fill="#746a78">QDRANT</text>
    <circle cx="274" cy="271" r="1.5" fill="#b1a5b3"/>
    <text x="286" y="274" fill="#746a78">PGVECTOR</text>
  </g>

  <!-- Conceptual exposure map -->
  <rect x="570" y="48" width="342" height="204" rx="14" fill="#f0eaf0" stroke="#c9bdca"/>
  <g clip-path="url(#mapClip)">
    <rect x="570" y="48" width="342" height="204" fill="url(#microgrid)"/>

    <g fill="none" stroke="#9b3da8" stroke-width="0.9" opacity="0.34" class="flow">
      <path d="M611 156C649 128 676 109 710 100S773 87 811 101"/>
      <path d="M611 156C660 162 695 177 727 184S789 199 842 178"/>
      <path d="M611 156C653 144 700 145 747 146S816 141 867 127"/>
    </g>
    <g fill="none" stroke="#c45143" stroke-width="0.9" opacity="0.38">
      <path d="M747 146L776 91M747 146L811 101M747 146L842 178M747 146L867 127"/>
    </g>

    <!-- Corpus rows -->
    <g fill="#9c91a0">
      <circle cx="641" cy="88" r="3"/><circle cx="674" cy="82" r="3"/><circle cx="710" cy="100" r="3"/>
      <circle cx="742" cy="78" r="3"/><circle cx="776" cy="91" r="3"/><circle cx="811" cy="101" r="3"/>
      <circle cx="846" cy="79" r="3"/><circle cx="879" cy="94" r="3"/>
      <circle cx="634" cy="126" r="3"/><circle cx="669" cy="119" r="3"/><circle cx="703" cy="131" r="3"/>
      <circle cx="747" cy="146" r="3"/><circle cx="784" cy="129" r="3"/><circle cx="823" cy="137" r="3"/>
      <circle cx="867" cy="127" r="3"/>
      <circle cx="641" cy="184" r="3"/><circle cx="679" cy="172" r="3"/><circle cx="727" cy="184" r="3"/>
      <circle cx="767" cy="202" r="3"/><circle cx="805" cy="186" r="3"/><circle cx="842" cy="178" r="3"/>
      <circle cx="878" cy="207" r="3"/>
    </g>
    <g fill="#9b3da8" filter="url(#glow)">
      <circle cx="710" cy="100" r="3"/><circle cx="811" cy="101" r="3"/>
      <circle cx="669" cy="119" r="3"/><circle cx="703" cy="131" r="3"/>
      <circle cx="823" cy="137" r="3"/><circle cx="867" cy="127" r="3"/>
      <circle cx="679" cy="172" r="3"/><circle cx="727" cy="184" r="3"/>
      <circle cx="842" cy="178" r="3"/>
    </g>
    <circle cx="747" cy="146" r="12" fill="#c45143" opacity="0.12" class="ping2"/>
    <circle cx="747" cy="146" r="5" fill="#c45143" filter="url(#glow)"/>

    <!-- Probe -->
    <circle cx="611" cy="156" r="16" fill="#167b9c" opacity="0.1" class="ping"/>
    <circle cx="611" cy="156" r="5" fill="#f0eaf0" stroke="#167b9c" stroke-width="2"/>
    <path d="M606 156H616M611 151V161" stroke="#167b9c" stroke-width="1"/>
  </g>

  <text x="589" y="70" class="mono" fill="#716776" font-size="8.5" letter-spacing="1.25">CORPUS EXPOSURE / SCHEMATIC</text>
  <g class="mono" font-size="8" letter-spacing="0.7">
    <circle cx="599" cy="231" r="2.5" fill="#9b3da8"/><text x="608" y="234" fill="#716776">EXPOSED</text>
    <circle cx="672" cy="231" r="2.5" fill="#c45143"/><text x="681" y="234" fill="#716776">HUB</text>
    <circle cx="722" cy="231" r="2.5" fill="#9c91a0"/><text x="731" y="234" fill="#716776">DARK MATTER</text>
  </g>

  <path d="M531 56V244" stroke="#ddd3de"/>
  <g transform="translate(839 215)">
    <rect width="54" height="22" rx="11" fill="#4d7c25" fill-opacity="0.08" stroke="#4d7c25" stroke-opacity="0.32"/>
    <circle cx="12" cy="11" r="2.5" fill="#4d7c25"/>
    <text x="21" y="14" class="mono" fill="#466f24" font-size="7.5" letter-spacing="0.7">GATE</text>
  </g>
</svg>
