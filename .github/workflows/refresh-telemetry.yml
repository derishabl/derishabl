name: Refresh profile activity

on:
  schedule:
    - cron: "17 2 * * *"
  workflow_dispatch:
  push:
    paths:
      - "scripts/generate_dashboard.py"
      - ".github/workflows/refresh-telemetry.yml"

permissions:
  contents: write

concurrency:
  group: profile-activity
  cancel-in-progress: true

jobs:
  render:
    runs-on: ubuntu-latest
    steps:
      - name: Check out profile repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Generate activity dashboard
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PROFILE_USERNAME: derishabl
        run: python scripts/generate_dashboard.py

      - name: Publish refreshed activity
        run: |
          if git diff --quiet -- assets/stats-dark.svg assets/stats-light.svg; then
            echo "Activity dashboard is already current."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/stats-dark.svg assets/stats-light.svg
          git commit -m "chore: refresh profile activity [skip ci]"
          git push
